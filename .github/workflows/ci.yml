name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DB_ROOT: garden-test
          VITE_SKIP_AUTH: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        run: VITE_DB_ROOT=garden-test npx tsx scripts/seed-test-db.ts
        env:
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      - name: Run Playwright tests
        run: npx vite preview --port 4173 & sleep 2 && BASE_URL=http://localhost:4173 npx playwright test --reporter=line

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ALLOWED_EMAILS: ${{ secrets.VITE_ALLOWED_EMAILS }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: garden.scottjmitchell.com
